name: Anonymize HSE education details v3

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  update-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Check out CV repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF verification tooling
        run: python3 -m pip install --disable-pip-version-check pymupdf pillow

      - name: Replace education wording in all HTML variants
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          en_pages = [
              "en.html",
              "en-compiler.html",
              "en-algorithms.html",
              "en-cpp-systems.html",
              "en-devtools.html",
              "en-backend.html",
              "en-platform.html",
              "en-edtech.html",
          ]
          ru_pages = [
              "ru.html",
              "ru-compiler.html",
              "ru-algorithms.html",
              "ru-cpp-systems.html",
              "ru-devtools.html",
              "ru-backend.html",
              "ru-platform.html",
              "ru-edtech.html",
          ]

          education_section_re = re.compile(
              r'(<section\b[^>]*\bid="education"[^>]*>)(.*?)(</section>)',
              re.IGNORECASE | re.DOTALL,
          )

          def replace_once(text: str, pattern: str, replacement: str, filename: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)
              if count != 1:
                  raise RuntimeError(f"{filename}: expected one {label}, found {count}")
              return updated

          def update_page(filename: str, *, russian: bool) -> None:
              path = Path(filename)
              text = path.read_text(encoding="utf-8")

              if russian:
                  hero_pattern = r'<span>НИУ ВШЭ\s*·\s*Программная инженерия\s*·\s*2026[–-]2030</span>'
                  hero_replacement = '<span>Студент НИУ ВШЭ</span>'
                  intro_replacement = '<p class="section-intro">Студент НИУ ВШЭ.</p>'
                  article_replacement = (
                      '<article><time>Студент</time><div><h3>'
                      '<a href="https://www.hse.ru/" rel="noopener noreferrer" target="_blank">НИУ ВШЭ</a>'
                      '</h3><p class="org">Москва</p></div>'
                      '<p class="details">Студент НИУ ВШЭ.</p></article>'
                  )
                  marker = "Студент НИУ ВШЭ"
              else:
                  hero_pattern = r'<span>HSE University\s*·\s*Software Engineering\s*·\s*2026[–-]2030</span>'
                  hero_replacement = '<span>HSE University student</span>'
                  intro_replacement = '<p class="section-intro">HSE University student.</p>'
                  article_replacement = (
                      '<article><time>Student</time><div><h3>'
                      '<a href="https://www.hse.ru/en/" rel="noopener noreferrer" target="_blank">HSE University</a>'
                      '</h3><p class="org">Moscow</p></div>'
                      '<p class="details">HSE University student.</p></article>'
                  )
                  marker = "HSE University student"

              text = replace_once(text, hero_pattern, hero_replacement, filename, "dated HSE hero item")

              section_match = education_section_re.search(text)
              if not section_match:
                  raise RuntimeError(f"{filename}: education section not found")

              section = section_match.group(0)
              section = replace_once(
                  section,
                  r'<p class="section-intro">.*?</p>',
                  intro_replacement,
                  filename,
                  "education introduction",
              )
              section = replace_once(
                  section,
                  r'<article><time[^>]*>.*?2030</time>.*?</article>',
                  article_replacement,
                  filename,
                  "dated HSE education article",
              )
              text = text[:section_match.start()] + section + text[section_match.end():]

              forbidden_patterns = (
                  r'2030',
                  r'2026[–-]2030',
                  r'Expected graduation',
                  r'Ожидаемый выпуск',
                  r'full-time studies begin',
                  r'начало очного обучения',
                  r'bachelor.s programme 09\.03\.04',
                  r'бакалавриат 09\.03\.04',
              )
              for pattern in forbidden_patterns:
                  if re.search(pattern, text, flags=re.IGNORECASE):
                      raise RuntimeError(f"{filename}: forbidden education detail remains: {pattern}")

              if text.count(marker) < 2:
                  raise RuntimeError(f"{filename}: generic HSE student wording is missing")

              path.write_text(text, encoding="utf-8")

          for page in en_pages:
              update_page(page, russian=False)
          for page in ru_pages:
              update_page(page, russian=True)

          print(f"Updated and verified {len(en_pages) + len(ru_pages)} HTML pages")
          PY

      - name: Patch and visually verify all one-page PDFs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          import fitz
          from PIL import Image, ImageChops

          before_dir = Path("qa-before")
          after_dir = Path("qa-after")
          before_dir.mkdir(exist_ok=True)
          after_dir.mkdir(exist_ok=True)

          pdfs = sorted(Path("pdf").glob("*.pdf"))
          if len(pdfs) != 14:
              raise RuntimeError(f"Expected 14 CV PDFs, found {len(pdfs)}")

          old_markers = ("Software Engineering", "Программная инженерия")
          forbidden = (
              "2030",
              "Expected graduation",
              "Ожидаемый выпуск",
              "expected graduation",
              "ожидаемый выпуск",
          )

          def rgb_from_int(color: int) -> tuple[float, float, float]:
              return (
                  ((color >> 16) & 255) / 255,
                  ((color >> 8) & 255) / 255,
                  (color & 255) / 255,
              )

          def render(page: fitz.Page, output: Path) -> None:
              pix = page.get_pixmap(matrix=fitz.Matrix(2, 2), alpha=False)
              pix.save(output)

          for path in pdfs:
              russian = path.stem.endswith("_RU")
              replacement = "Студент НИУ ВШЭ" if russian else "HSE University student"
              hse_url = "https://www.hse.ru/" if russian else "https://www.hse.ru/en/"

              doc = fitz.open(path)
              if len(doc) != 1:
                  raise RuntimeError(f"{path}: expected one page before editing, found {len(doc)}")
              page = doc[0]
              original_rect = page.rect
              original_links = len(page.get_links())
              original_text_chars = len(page.get_text().strip())
              render(page, before_dir / f"{path.stem}.png")

              matching_blocks = []
              for block in page.get_text("dict").get("blocks", []):
                  lines = block.get("lines", [])
                  text = "\n".join(
                      "".join(span.get("text", "") for span in line.get("spans", []))
                      for line in lines
                  )
                  if any(marker.casefold() in text.casefold() for marker in old_markers):
                      matching_blocks.append(block)

              if len(matching_blocks) != 1:
                  raise RuntimeError(f"{path}: expected one HSE education block, found {len(matching_blocks)}")

              block = matching_blocks[0]
              spans = [
                  span
                  for line in block.get("lines", [])
                  for span in line.get("spans", [])
                  if span.get("text")
              ]
              if not spans:
                  raise RuntimeError(f"{path}: education block has no text spans")

              first = spans[0]
              origin = fitz.Point(*first["origin"])
              font_size = float(first["size"])
              color = rgb_from_int(int(first["color"]))

              font_resource = None
              for font in page.get_fonts(full=True):
                  basefont = str(font[3])
                  resource_name = str(font[4])
                  if "Arimo" in basefont:
                      font_resource = resource_name
                      break
              if not font_resource:
                  raise RuntimeError(f"{path}: embedded Arimo font resource not found")

              redact_rect = fitz.Rect(block["bbox"])
              redact_rect.x0 -= 1.0
              redact_rect.y0 -= 1.0
              redact_rect.x1 += 1.0
              redact_rect.y1 += 1.0

              for link in list(page.get_links()):
                  link_rect = fitz.Rect(link.get("from", (0, 0, 0, 0)))
                  if link_rect.intersects(redact_rect):
                      page.delete_link(link)

              page.add_redact_annot(redact_rect, fill=(1, 1, 1))
              page.apply_redactions(images=fitz.PDF_REDACT_IMAGE_NONE)
              page.insert_text(
                  origin,
                  replacement,
                  fontname=font_resource,
                  fontsize=font_size,
                  color=color,
                  overlay=True,
              )

              link_width = max(80.0, font_size * len(replacement) * 0.62)
              link_rect = fitz.Rect(
                  origin.x,
                  origin.y - font_size * 1.25,
                  min(page.rect.x1, origin.x + link_width),
                  origin.y + font_size * 0.35,
              )
              page.insert_link({"kind": fitz.LINK_URI, "from": link_rect, "uri": hse_url})

              temp = path.with_suffix(".tmp.pdf")
              doc.save(temp, garbage=4, deflate=True)
              doc.close()
              temp.replace(path)

              check = fitz.open(path)
              if len(check) != 1:
                  raise RuntimeError(f"{path}: page count changed after editing")
              page = check[0]
              if page.rect != original_rect:
                  raise RuntimeError(f"{path}: page dimensions changed after editing")

              text = page.get_text()
              for marker in forbidden:
                  if marker.casefold() in text.casefold():
                      raise RuntimeError(f"{path}: forbidden graduation detail remains: {marker}")
              if replacement not in text:
                  raise RuntimeError(f"{path}: generic HSE student wording is missing")
              if len(text.strip()) < 1000 or len(text.strip()) < original_text_chars - 500:
                  raise RuntimeError(f"{path}: text layer is unexpectedly incomplete")

              links = page.get_links()
              if len(links) < max(1, original_links - 1):
                  raise RuntimeError(f"{path}: too many clickable links were lost")
              if any("/ba/se/" in str(link.get("uri", "")) for link in links):
                  raise RuntimeError(f"{path}: old programme-specific HSE link remains")
              if not any(str(link.get("uri", "")).rstrip("/") == hse_url.rstrip("/") for link in links):
                  raise RuntimeError(f"{path}: generic HSE link is missing")

              after_png = after_dir / f"{path.stem}.png"
              render(page, after_png)
              check.close()

              before = Image.open(before_dir / f"{path.stem}.png").convert("RGB")
              after = Image.open(after_png).convert("RGB")
              if before.size != after.size:
                  raise RuntimeError(f"{path}: rendered dimensions changed")
              diff = ImageChops.difference(before, after)
              bbox = diff.getbbox()
              if bbox is None:
                  raise RuntimeError(f"{path}: visual render did not change")

              width, height = before.size
              if bbox[0] < width * 0.54:
                  raise RuntimeError(f"{path}: visual changes escaped the education column: {bbox}")
              changed = sum(1 for pixel in diff.getdata() if pixel != (0, 0, 0))
              ratio = changed / (width * height)
              if ratio > 0.025:
                  raise RuntimeError(f"{path}: visual diff is too large: {ratio:.3%}")

              print(
                  f"Verified {path}: one page, generic wording, links intact, "
                  f"visual diff {ratio:.3%} within {bbox}"
              )

          print("Patched and verified all 14 PDF variants")
          PY

      - name: Upload visual QA renders
        uses: actions/upload-artifact@v4
        with:
          name: cv-hse-anonymization-qa
          path: |
            qa-before
            qa-after
          retention-days: 7
          if-no-files-found: error

      - name: Remove temporary files and rebuild manifest
        shell: bash
        run: |
          set -euo pipefail
          rm -rf qa-before qa-after
          rm -f .github/workflows/anonymize-hse-student-main.yml
          rm -f .github/workflows/anonymize-hse-student-v2.yml
          rm -f .github/workflows/anonymize-hse-student-v3.yml
          rm -f .github/workflows/inspect-pdf-education.yml
          rm -f .github/workflows/dispatch-cv-anonymization.yml
          find . -type f \
            ! -path './.git/*' \
            ! -name 'MANIFEST.sha256' \
            -print0 | sort -z | xargs -0 sha256sum > MANIFEST.sha256
          sha256sum -c MANIFEST.sha256

      - name: Commit anonymized CV variants
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Anonymize HSE education details in CV'
          git push
