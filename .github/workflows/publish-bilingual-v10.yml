name: Publish bilingual CV v10

on:
  push:
    branches:
      - publish-bilingual-v10

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: publish-bilingual-v10
          fetch-depth: 0

      - name: Decode verified site files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import shutil

          root = Path('.')
          payload = root / '.publish'
          mappings = {
              'en.html': ('en.html.gz.b64', 'd2ee56a1e19a932202348bb8c4a17f434a045aa46ad6ef99798224698241235e'),
              'ru.html': ('ru.html.gz.b64', '8722babee80abd6fc8739150e7942c70abbb8971a895a9f20dc0bfea584ea3ad'),
          }

          for target, (source, expected) in mappings.items():
              compressed = base64.b64decode((payload / source).read_text(encoding='ascii'))
              data = gzip.decompress(compressed)
              actual = hashlib.sha256(data).hexdigest()
              if actual != expected:
                  raise SystemExit(f'{target}: SHA-256 mismatch: {actual}')
              (root / target).write_bytes(data)

          style_b64 = ''.join([
              (payload / 'style.css.gz.b64.part1').read_text(encoding='ascii'),
              (payload / 'style.css.gz.b64.part2').read_text(encoding='ascii'),
          ])
          style = gzip.decompress(base64.b64decode(style_b64))
          actual = hashlib.sha256(style).hexdigest()
          expected = 'f6a35ef34551b18807acb36032754b768628e3d0934c2df6ebd70218ab0e2a37'
          if actual != expected:
              raise SystemExit(f'style.css: SHA-256 mismatch: {actual}')
          (root / 'style.css').write_bytes(style)

          shutil.copyfile(root / 'en.html', root / 'index.html')
          if hashlib.sha256((root / 'index.html').read_bytes()).hexdigest() != mappings['en.html'][1]:
              raise SystemExit('index.html differs from en.html')
          PY

      - name: Validate local references and scripts
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import json

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  for key in ('href', 'src'):
                      value = values.get(key)
                      if value and not value.startswith(('#', 'http://', 'https://', 'mailto:', 'tel:', 'data:')):
                          self.refs.append(value.split('#', 1)[0].split('?', 1)[0])

          for name in ('index.html', 'en.html', 'ru.html', 'cv.html'):
              parser = Parser()
              parser.feed(Path(name).read_text(encoding='utf-8'))
              missing = sorted({ref for ref in parser.refs if ref and not Path(ref).exists()})
              if missing:
                  raise SystemExit(f'{name}: missing local references: {missing}')
          PY
          node --check script.js

      - name: Replace publication payload with final files
        shell: bash
        run: |
          rm -rf .publish
          rm -f .github/workflows/publish-bilingual-v10.yml
          rm -f styles.css
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add bilingual English and Russian profile site"
          git push origin HEAD:publish-bilingual-v10
