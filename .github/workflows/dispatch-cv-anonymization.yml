name: Dispatch CV anonymization

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .cv-anonymize-request

permissions:
  actions: read
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Show education-related PDF spans
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          gh run view 30040815121 --repo "$GITHUB_REPOSITORY" --log \
            | grep -E '=== pdf/|page=[0-9]+ line=|  span=' \
            | sed -E 's/^inspect[[:space:]]+Inspect education-related PDF spans[[:space:]]+[^Z]+Z[[:space:]]+//'
