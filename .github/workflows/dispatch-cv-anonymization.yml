name: Dispatch CV anonymization

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .cv-anonymize-request

permissions:
  actions: read
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Show PDF export error
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          gh run view 30040393234 --repo "$GITHUB_REPOSITORY" --log-failed | tail -n 45
