name: Dispatch CV anonymization

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .cv-anonymize-request

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch or join the main anonymization workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          workflow="anonymize-hse-student-main.yml"

          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "$workflow" \
            --limit 1 \
            --json databaseId,status \
            --jq 'map(select(.status == "queued" or .status == "in_progress"))[0].databaseId // empty')"

          if [[ -z "$run_id" ]]; then
            previous_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$workflow" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')"

            gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref main

            for _ in {1..30}; do
              run_id="$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow" \
                --limit 1 \
                --json databaseId \
                --jq --argjson previous "$previous_id" 'map(select(.databaseId != $previous))[0].databaseId // empty')"
              [[ -n "$run_id" ]] && break
              sleep 5
            done
          fi

          if [[ -z "$run_id" ]]; then
            echo "Could not resolve the dispatched workflow run" >&2
            exit 1
          fi

          echo "Watching main workflow run: $run_id"
          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10
