name: Finalize CV

on:
  push:
    branches:
      - main
    paths:
      - .cv-final-trigger

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply reviewed CV patch
        run: bash .github/finalize-cv.sh
