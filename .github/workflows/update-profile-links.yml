name: Update profile links

on:
  push:
    branches:
      - remove-print-cv-add-mcst-link
    paths:
      - .github/workflows/update-profile-links.yml

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remove-print-cv-add-mcst-link
          fetch-depth: 0

      - name: Apply requested changes
        run: python3 .github/scripts/update_profile_links.py

      - name: Validate content and rendering
        shell: bash
        run: |
          set -euo pipefail
          test ! -e cv.html
          test ! -e cv.css
          ! grep -RIn --exclude-dir=.git --exclude='update_profile_links.py' --exclude='update-profile-links.yml' -- 'cv\.html\|cv\.css' .
          test "$(grep -o 'https://www.mcst.ru/student' ru.html | wc -l)" -eq 1
          test "$(grep -o 'https://www.mcst.ru/student' en.html | wc -l)" -eq 1
          cmp en.html index.html
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for filename in ("ru.html", "en.html", "index.html"):
              parser = Parser()
              parser.feed(Path(filename).read_text(encoding="utf-8"))
          PY
          curl --fail --location --silent --show-error --output /dev/null https://www.mcst.ru/student
          BROWSER="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$BROWSER"
          "$BROWSER" --headless --disable-gpu --no-sandbox --window-size=1600,1200 --screenshot=/tmp/ru-desktop.png "file://$PWD/ru.html#recognition"
          "$BROWSER" --headless --disable-gpu --no-sandbox --window-size=390,1200 --screenshot=/tmp/ru-mobile.png "file://$PWD/ru.html#recognition"
          "$BROWSER" --headless --disable-gpu --no-sandbox --window-size=1600,1200 --screenshot=/tmp/en-desktop.png "file://$PWD/en.html#recognition"
          test -s /tmp/ru-desktop.png
          test -s /tmp/ru-mobile.png
          test -s /tmp/en-desktop.png
          git diff --check

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ru.html en.html index.html
          git commit -m "Remove printable CV and add MCST program link"
          git push origin HEAD:remove-print-cv-add-mcst-link
