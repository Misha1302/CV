name: Rename lyceum wording

on:
  push:
    branches:
      - main
    paths:
      - .cv-rename-lyceum-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply wording fix
        run: bash .github/rename-lyceum.sh
