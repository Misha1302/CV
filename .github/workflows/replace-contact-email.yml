name: Replace contact email

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace-contact-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF tooling
        run: python3 -m pip install --disable-pip-version-check pymupdf

      - name: Replace obsolete email everywhere
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import fitz

          old = 'razakov.misha@mail.ru'
          new = 'misha13022008@gmail.com'
          root = Path('.')
          text_suffixes = {'.html', '.md', '.txt', '.xml', '.yml', '.yaml', '.js', '.css', '.svg'}

          changed = []
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              if old in text:
                  path.write_text(text.replace(old, new), encoding='utf-8')
                  changed.append(path.as_posix())

          pdfs = sorted((root / 'pdf').glob('*.pdf'))
          if len(pdfs) != 10:
              raise RuntimeError(f'Expected 10 PDFs, found {len(pdfs)}')

          for pdf in pdfs:
              doc = fitz.open(pdf)
              replaced = 0
              for page in doc:
                  rects = page.search_for(old)
                  if not rects:
                      continue
                  spans = [
                      span
                      for block in page.get_text('dict').get('blocks', [])
                      for line in block.get('lines', [])
                      for span in line.get('spans', [])
                      if old in span.get('text', '')
                  ]
                  if len(rects) != 1 or len(spans) != 1:
                      raise RuntimeError(f'{pdf}: ambiguous email placement')

                  old_links = [dict(link) for link in page.get_links() if link.get('uri') == f'mailto:{old}']
                  for link in old_links:
                      page.delete_link(link)

                  rect = rects[0]
                  span = spans[0]
                  next_hits = page.search_for('t.me/Micodiy')
                  max_x = next_hits[0].x0 - 3 if next_hits else rect.x1 + 30
                  available = max_x - rect.x0
                  size = min(float(span.get('size', 7.0)), 7.0)
                  while size > 5.0 and fitz.get_text_length(new, fontname='helv', fontsize=size) > available:
                      size -= 0.1
                  width = fitz.get_text_length(new, fontname='helv', fontsize=size)
                  if width > available:
                      raise RuntimeError(f'{pdf}: replacement does not fit contact line')

                  page.add_redact_annot(fitz.Rect(rect.x0 - .5, rect.y0 - .5, rect.x1 + .5, rect.y1 + .5), fill=(1, 1, 1))
                  page.apply_redactions(images=fitz.PDF_REDACT_IMAGE_NONE)

                  color = int(span.get('color', 0))
                  rgb = (((color >> 16) & 255) / 255, ((color >> 8) & 255) / 255, (color & 255) / 255)
                  origin = span['origin']
                  page.insert_text(origin, new, fontname='helv', fontsize=size, color=rgb, overlay=True)
                  link_rect = fitz.Rect(origin[0], span['bbox'][1], origin[0] + width, span['bbox'][3])
                  page.insert_link({'kind': fitz.LINK_URI, 'from': link_rect, 'uri': f'mailto:{new}'})
                  replaced += 1

              if replaced != 1:
                  raise RuntimeError(f'{pdf}: expected one replacement, got {replaced}')
              temp = pdf.with_suffix('.tmp.pdf')
              doc.save(temp, garbage=4, deflate=True)
              doc.close()
              temp.replace(pdf)

          print(f'Updated {len(changed)} text files and {len(pdfs)} PDFs')
          PY

      - name: Verify repository state
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import fitz

          old = 'razakov.misha@mail.ru'
          new = 'misha13022008@gmail.com'
          root = Path('.')
          text_suffixes = {'.html', '.md', '.txt', '.xml', '.yml', '.yaml', '.js', '.css', '.svg'}

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              if old in text:
                  raise RuntimeError(f'Old email remains in {path}')

          pdfs = sorted((root / 'pdf').glob('*.pdf'))
          for pdf in pdfs:
              doc = fitz.open(pdf)
              if len(doc) != 2:
                  raise RuntimeError(f'{pdf}: expected 2 pages, got {len(doc)}')
              text = '\n'.join(page.get_text() for page in doc)
              if old in text or text.count(new) != 1:
                  raise RuntimeError(f'{pdf}: visible email verification failed')
              uris = [link.get('uri', '') for page in doc for link in page.get_links()]
              if f'mailto:{new}' not in uris or f'mailto:{old}' in uris:
                  raise RuntimeError(f'{pdf}: mailto verification failed')
          print(f'Verified {len(pdfs)} two-page PDFs')
          PY

      - name: Remove one-shot workflow and rebuild manifest
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/replace-contact-email.yml
          find . -type f ! -path './.git/*' ! -path './SHA256SUMS.txt' -print0 \
            | sort -z | xargs -0 sha256sum | sed 's#  \./#  #' > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace obsolete CV contact email everywhere'
          git push
