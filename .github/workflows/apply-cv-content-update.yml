name: Apply CV content update

on:
  push:
    paths:
      - .github/workflows/apply-cv-content-update.yml

permissions:
  contents: write

jobs:
  update:
    if: github.event.head_commit.message == 'Apply temporary CV content updater'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update profile content
        shell: bash
        run: |
          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          SOURCE_URL = "https://github.com/Misha1302/ps_form_analizer"

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          def reorder_primary_sections(text: str, labels: tuple[str, str, str]) -> str:
              sections: dict[str, str] = {}
              for section_id in ("profile", "experience", "work"):
                  pattern = re.compile(
                      rf'\n<section class="section" id="{section_id}">.*?\n</section>',
                      re.DOTALL,
                  )
                  match = pattern.search(text)
                  if match is None:
                      raise RuntimeError(f"{labels[0]}: section {section_id!r} not found")
                  sections[section_id] = match.group(0)
                  text = text[:match.start()] + text[match.end():]

              marker = '\n<section class="section" id="capabilities">'
              if text.count(marker) != 1:
                  raise RuntimeError(f"{labels[0]}: capabilities marker is not unique")

              ordered = sections["work"] + sections["experience"] + sections["profile"]
              return text.replace(marker, ordered + marker, 1)

          def patch_english(text: str) -> str:
              text = replace_once(
                  text,
                  '<a href="#profile">Profile</a>\n<a href="#experience">Experience</a>\n<a href="#work">Selected work</a>',
                  '<a href="#work">Selected work</a>\n<a href="#experience">Experience</a>\n<a href="#profile">Profile</a>',
                  'English mobile navigation',
              )
              text = replace_once(
                  text,
                  '<a data-nav="" href="#profile"><span>01</span>Profile</a>\n<a data-nav="" href="#experience"><span>02</span>Experience</a>\n<a data-nav="" href="#work"><span>03</span>Selected work</a>',
                  '<a data-nav="" href="#work"><span>01</span>Selected work</a>\n<a data-nav="" href="#experience"><span>02</span>Experience</a>\n<a data-nav="" href="#profile"><span>03</span>Profile</a>',
                  'English desktop navigation',
              )
              text = replace_once(
                  text,
                  '<a class="primary" href="mailto:misha13022008@gmail.com">Contact me</a>\n<a href="https://github.com/Misha1302" rel="noopener noreferrer" target="_blank">GitHub ↗</a>\n<a href="cv.html">Open CV</a>',
                  '<a class="primary" href="#work">View selected work</a>\n<a href="cv.html">Open CV</a>\n<a href="https://github.com/Misha1302" rel="noopener noreferrer" target="_blank">GitHub ↗</a>\n<a href="mailto:misha13022008@gmail.com">Email</a>',
                  'English hero actions',
              )
              text = replace_once(
                  text,
                  '<header class="section-heading"><span>01</span><div><p>Profile</p><h2>I design language systems where semantics, execution and evidence stay aligned.</h2></div></header>',
                  '<header class="section-heading"><span>03</span><div><p>Profile</p><h2>I design language systems where semantics, execution and evidence stay aligned.</h2></div></header>',
                  'English profile number',
              )
              text = replace_once(
                  text,
                  '<header class="section-heading"><span>03</span><div><p>Selected work</p><h2>Three systems, three kinds of engineering.</h2></div></header>',
                  '<header class="section-heading"><span>01</span><div><p>Selected work</p><h2>Three systems, three kinds of engineering.</h2></div></header>',
                  'English work number',
              )
              text = replace_once(
                  text,
                  '<article><time>Active</time><div><h3>Independent compiler/runtime engineer</h3><p class="meta">Creator of UniversalToolchain/Wist</p><p>Design and maintain semantic boundaries, modular composition, interpreter and CIL execution, optimizer legality, APIs, tests, packaging, documentation and release gates.</p><b>Open source · Developer tooling</b></div></article>',
                  '<article><time>Active</time><div><h3>Creator and maintainer · UniversalToolchain/Wist</h3><p class="meta">Open-source compiler/runtime framework</p><p>Design and maintain semantic boundaries, modular composition, interpreter and CIL execution, optimizer legality, APIs, tests, packaging, documentation and release gates.</p><b>Open source · Developer tooling</b></div></article>\n<article><time>Active</time><div><h3>Architecture and backend · CompilationLab</h3><p class="meta">Co-developed with a full-stack engineer · pre-user stage</p><p>Designed the system architecture and implemented the complete backend, database model, persistence layer and API contracts. Architectural decisions and frontend–backend boundaries are reviewed jointly; selected frontend flows are reviewed together.</p><b>Team engineering · Backend systems</b></div></article>',
                  'English experience ownership',
              )
              text = replace_once(
                  text,
                  '<footer><span>C17</span><span>Python</span><strong>104/104</strong></footer>',
                  f'<footer><a href="{SOURCE_URL}" rel="noopener noreferrer" target="_blank">Source code ↗</a><span>C17</span><span>Python</span><strong>104/104</strong></footer>',
                  'English MCST source link',
              )
              text = replace_once(
                  text,
                  '<article><span>2026 · MCST</span><h3>LLVM compiler internship selection</h3><p>First place, the only 5.0/5.0 result and the only submission passing all 104 tests.</p><div class="evidence-links"><strong>87 applicants · 49 submissions</strong></div></article>',
                  f'<article><span>2026 · MCST</span><h3>LLVM compiler internship selection</h3><p>First place, the only 5.0/5.0 result and the only submission passing all 104 tests.</p><div class="evidence-links"><strong>87 applicants · 49 submissions</strong><a href="{SOURCE_URL}" rel="noopener noreferrer" target="_blank">Source code ↗</a></div></article>',
                  'English MCST evidence link',
              )
              text = replace_once(
                  text,
                  '<a href="https://github.com/Misha1302/CompilationLab" rel="noopener noreferrer" target="_blank"><span>Education</span><h3>CompilationLab</h3><p>A project laboratory for school students studying compilers, JITs, algorithms and engineering practice.</p><b>View project ↗</b></a>',
                  '<a href="https://github.com/Misha1302/CompilationLab" rel="noopener noreferrer" target="_blank"><span>Team project · pre-user stage</span><h3>CompilationLab</h3><p>Co-developed educational platform. I own the system architecture, backend, database model, persistence layer and API contracts.</p><b>View project ↗</b></a>',
                  'English CompilationLab card',
              )
              return reorder_primary_sections(text, ('English', 'Experience', 'Profile'))

          def patch_russian(text: str) -> str:
              text = replace_once(
                  text,
                  '<a href="#profile">Профиль</a>\n<a href="#experience">Опыт</a>\n<a href="#work">Избранные проекты</a>',
                  '<a href="#work">Избранные проекты</a>\n<a href="#experience">Опыт</a>\n<a href="#profile">Профиль</a>',
                  'Russian mobile navigation',
              )
              text = replace_once(
                  text,
                  '<a data-nav="" href="#profile"><span>01</span>Профиль</a>\n<a data-nav="" href="#experience"><span>02</span>Опыт</a>\n<a data-nav="" href="#work"><span>03</span>Избранные проекты</a>',
                  '<a data-nav="" href="#work"><span>01</span>Избранные проекты</a>\n<a data-nav="" href="#experience"><span>02</span>Опыт</a>\n<a data-nav="" href="#profile"><span>03</span>Профиль</a>',
                  'Russian desktop navigation',
              )
              text = replace_once(
                  text,
                  '<a class="primary" href="mailto:misha13022008@gmail.com">Связаться</a>\n<a href="https://github.com/Misha1302" rel="noopener noreferrer" target="_blank">GitHub ↗</a>\n<a href="cv.html">Открыть CV на английском</a>',
                  '<a class="primary" href="#work">Смотреть проекты</a>\n<a href="cv.html">Открыть CV на английском</a>\n<a href="https://github.com/Misha1302" rel="noopener noreferrer" target="_blank">GitHub ↗</a>\n<a href="mailto:misha13022008@gmail.com">Почта</a>',
                  'Russian hero actions',
              )
              text = replace_once(
                  text,
                  '<header class="section-heading"><span>01</span><div><p>Профиль</p><h2>Проектирую языковые системы, в которых семантика, исполнение и доказательства согласованы.</h2></div></header>',
                  '<header class="section-heading"><span>03</span><div><p>Профиль</p><h2>Проектирую языковые системы, в которых семантика, исполнение и доказательства согласованы.</h2></div></header>',
                  'Russian profile number',
              )
              text = replace_once(
                  text,
                  '<header class="section-heading"><span>03</span><div><p>Избранные проекты</p><h2>Три системы — три типа инженерной работы.</h2></div></header>',
                  '<header class="section-heading"><span>01</span><div><p>Избранные проекты</p><h2>Три системы — три типа инженерной работы.</h2></div></header>',
                  'Russian work number',
              )
              text = replace_once(
                  text,
                  '<article><time>Сейчас</time><div><h3>Независимый инженер компиляторов и runtime-систем</h3><p class="meta">Создатель UniversalToolchain/Wist</p><p>Проектирую и поддерживаю семантические границы, модульную композицию, интерпретатор и CIL-исполнение, корректность оптимизаторов, API, тесты, упаковку, документацию и release-gates.</p><b>Open source · Инструменты разработчика</b></div></article>',
                  '<article><time>Сейчас</time><div><h3>Создатель и maintainer · UniversalToolchain/Wist</h3><p class="meta">Open-source фреймворк компиляторов и runtime</p><p>Проектирую и поддерживаю семантические границы, модульную композицию, интерпретатор и CIL-исполнение, корректность оптимизаторов, API, тесты, упаковку, документацию и release-gates.</p><b>Open source · Инструменты разработчика</b></div></article>\n<article><time>Сейчас</time><div><h3>Архитектура и backend · CompilationLab</h3><p class="meta">Совместная разработка с full-stack-инженером · до запуска</p><p>Спроектировал архитектуру системы и реализовал весь backend, модель базы данных, слой хранения и API-контракты. Архитектурные решения и границы frontend/backend согласуем совместно; отдельные frontend-сценарии просматриваем вместе.</p><b>Командная разработка · Backend-системы</b></div></article>',
                  'Russian experience ownership',
              )
              text = replace_once(
                  text,
                  '<footer><span>C17</span><span>Python</span><strong>104/104</strong></footer>',
                  f'<footer><a href="{SOURCE_URL}" rel="noopener noreferrer" target="_blank">Исходный код ↗</a><span>C17</span><span>Python</span><strong>104/104</strong></footer>',
                  'Russian MCST source link',
              )
              text = replace_once(
                  text,
                  '<article><span>2026 · МЦСТ</span><h3>Отбор на стажировку по LLVM-компилятору</h3><p>Первое место, единственный результат 5,0/5,0 и единственное решение, прошедшее все 104 теста.</p><div class="evidence-links"><strong>87 заявок · 49 решений</strong></div></article>',
                  f'<article><span>2026 · МЦСТ</span><h3>Отбор на стажировку по LLVM-компилятору</h3><p>Первое место, единственный результат 5,0/5,0 и единственное решение, прошедшее все 104 теста.</p><div class="evidence-links"><strong>87 заявок · 49 решений</strong><a href="{SOURCE_URL}" rel="noopener noreferrer" target="_blank">Исходный код ↗</a></div></article>',
                  'Russian MCST evidence link',
              )
              text = replace_once(
                  text,
                  '<a href="https://github.com/Misha1302/CompilationLab" rel="noopener noreferrer" target="_blank"><span>Образование</span><h3>CompilationLab</h3><p>Проектная лаборатория для школьников, изучающих компиляторы, JIT, алгоритмы и инженерную практику.</p><b>Открыть проект ↗</b></a>',
                  '<a href="https://github.com/Misha1302/CompilationLab" rel="noopener noreferrer" target="_blank"><span>Командный проект · до запуска</span><h3>CompilationLab</h3><p>Совместно разрабатываемая образовательная платформа. Я отвечаю за архитектуру, весь backend, модель БД, хранение данных и API-контракты.</p><b>Открыть проект ↗</b></a>',
                  'Russian CompilationLab card',
              )
              return reorder_primary_sections(text, ('Russian', 'Experience', 'Profile'))

          def patch_cv(text: str) -> str:
              text = replace_once(
                  text,
                  '<div><h2>Independent compiler/runtime engineer</h2><p class="meta">Creator of UniversalToolchain/Wist</p><p>Own architecture, semantic boundaries, modular composition, interpreter and CIL execution, optimizer legality, public APIs, tests, packaging, documentation and release gates.</p></div>',
                  '<div><h2>Creator and maintainer · UniversalToolchain/Wist</h2><p class="meta">Open-source compiler/runtime framework</p><p>Own architecture, semantic boundaries, modular composition, interpreter and CIL execution, optimizer legality, public APIs, tests, packaging, documentation and release gates.</p></div>',
                  'Printable UniversalToolchain role',
              )
              text = replace_once(
                  text,
                  '<div class="project-head"><h2>MCST selection solver and harness</h2><span>C17 · Python</span></div>',
                  f'<div class="project-head"><h2><a href="{SOURCE_URL}">MCST selection solver and harness</a></h2><span>C17 · Python · 104/104</span></div>',
                  'Printable MCST source link',
              )
              text = replace_once(
                  text,
                  '<p><strong>CompilationLab:</strong> project laboratory for students studying compilers, JITs, algorithms and engineering practice.</p>',
                  '<p><strong>CompilationLab:</strong> team-developed educational platform in active development before external launch. I own the architecture, backend, database model, persistence layer and API contracts.</p>',
                  'Printable CompilationLab ownership',
              )
              return text

          en_path = Path('en.html')
          index_path = Path('index.html')
          ru_path = Path('ru.html')
          cv_path = Path('cv.html')

          en = patch_english(en_path.read_text(encoding='utf-8'))
          index = patch_english(index_path.read_text(encoding='utf-8'))
          ru = patch_russian(ru_path.read_text(encoding='utf-8'))
          cv = patch_cv(cv_path.read_text(encoding='utf-8'))

          if en != index:
              raise RuntimeError('index.html and en.html diverged after the update')

          en_path.write_text(en, encoding='utf-8')
          index_path.write_text(index, encoding='utf-8')
          ru_path.write_text(ru, encoding='utf-8')
          cv_path.write_text(cv, encoding='utf-8')

          class SmokeParser(HTMLParser):
              pass

          for path in (en_path, index_path, ru_path, cv_path):
              content = path.read_text(encoding='utf-8')
              parser = SmokeParser(convert_charrefs=True)
              parser.feed(content)
              parser.close()

              ids = re.findall(r'\bid="([^"]+)"', content)
              duplicates = sorted({item for item in ids if ids.count(item) > 1})
              if duplicates:
                  raise RuntimeError(f'{path}: duplicate ids: {duplicates}')
              if content.count('<html') != 1 or content.count('</html>') != 1:
                  raise RuntimeError(f'{path}: invalid document boundary')

          for path in (en_path, index_path):
              content = path.read_text(encoding='utf-8')
              if content.index('id="work"') > content.index('id="experience"'):
                  raise RuntimeError(f'{path}: selected work must precede experience')
              if content.index('id="experience"') > content.index('id="profile"'):
                  raise RuntimeError(f'{path}: experience must precede profile')
              if content.count(SOURCE_URL) != 2:
                  raise RuntimeError(f'{path}: expected two MCST source links')
              if 'Independent compiler/runtime engineer' in content:
                  raise RuntimeError(f'{path}: old generic role remains')
              if 'pre-user stage' not in content:
                  raise RuntimeError(f'{path}: CompilationLab status is missing')

          ru_content = ru_path.read_text(encoding='utf-8')
          if ru_content.index('id="work"') > ru_content.index('id="experience"'):
              raise RuntimeError('ru.html: selected work must precede experience')
          if ru_content.index('id="experience"') > ru_content.index('id="profile"'):
              raise RuntimeError('ru.html: experience must precede profile')
          if ru_content.count(SOURCE_URL) != 2:
              raise RuntimeError('ru.html: expected two MCST source links')
          if 'Независимый инженер компиляторов и runtime-систем' in ru_content:
              raise RuntimeError('ru.html: old generic role remains')
          if 'до запуска' not in ru_content:
              raise RuntimeError('ru.html: CompilationLab status is missing')

          cv_content = cv_path.read_text(encoding='utf-8')
          if cv_content.count(SOURCE_URL) != 1:
              raise RuntimeError('cv.html: MCST source link is missing')
          if 'before external launch' not in cv_content:
              raise RuntimeError('cv.html: CompilationLab status is missing')
          PY

          git diff --check

      - name: Render desktop, laptop, tablet, phone and print layouts
        shell: bash
        run: |
          set -o pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME" ]; then
            echo "A Chromium-compatible browser is required for rendering validation." >&2
            exit 1
          fi

          rm -rf /tmp/cv-render
          mkdir -p /tmp/cv-render
          cp -a . /tmp/cv-render/site

          python3 <<'PY'
          from pathlib import Path

          script = '''<script>
          window.addEventListener('load', () => {
            const root = document.documentElement;
            const width = window.innerWidth;
            const scrollWidth = Math.max(root.scrollWidth, document.body.scrollWidth);
            document.body.dataset.layoutCheck = scrollWidth <= width + 1 ? 'ok' : `overflow-${scrollWidth}-${width}`;
          });
          </script>'''

          for name in ('en.html', 'ru.html'):
              path = Path('/tmp/cv-render/site') / name
              content = path.read_text(encoding='utf-8')
              if content.count('</body>') != 1:
                  raise RuntimeError(f'{name}: body boundary is not unique')
              path.write_text(content.replace('</body>', script + '\n</body>'), encoding='utf-8')
          PY

          cd /tmp/cv-render/site
          python3 -m http.server 8123 --bind 127.0.0.1 >/tmp/cv-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8123/en.html >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl --fail --silent http://127.0.0.1:8123/en.html >/dev/null
          curl --fail --silent http://127.0.0.1:8123/ru.html >/dev/null
          curl --fail --silent http://127.0.0.1:8123/cv.html >/dev/null

          index=0
          for page in en.html ru.html; do
            for viewport in 1440,900 1366,768 768,1024 390,844; do
              index=$((index + 1))
              width="${viewport%,*}"
              height="${viewport#*,}"
              output="/tmp/cv-render/dom-${index}.html"
              "$CHROME" \
                --headless=new \
                --no-sandbox \
                --disable-gpu \
                --hide-scrollbars \
                --virtual-time-budget=1500 \
                --window-size="${width},${height}" \
                --user-data-dir="/tmp/cv-render/chrome-${index}" \
                --dump-dom \
                "http://127.0.0.1:8123/${page}" >"$output" 2>/tmp/cv-render/chrome-${index}.log
              if ! grep -q 'data-layout-check="ok"' "$output"; then
                echo "Horizontal overflow detected for ${page} at ${width}x${height}." >&2
                grep -o 'data-layout-check="[^"]*"' "$output" >&2 || true
                exit 1
              fi
            done
          done

          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --virtual-time-budget=1500 \
            --user-data-dir=/tmp/cv-render/chrome-print \
            --print-to-pdf=/tmp/cv-render/cv.pdf \
            http://127.0.0.1:8123/cv.html >/tmp/cv-render/print.log 2>&1

          test -s /tmp/cv-render/cv.pdf
          python3 <<'PY'
          from pathlib import Path
          import re

          data = Path('/tmp/cv-render/cv.pdf').read_bytes()
          pages = len(re.findall(rb'/Type\s*/Page\b', data))
          if pages != 2:
              raise RuntimeError(f'Printable CV must remain two pages; rendered {pages}')
          PY

      - name: Commit verified content
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add en.html index.html ru.html cv.html
          git diff --cached --quiet && {
            echo "No content changes were produced." >&2
            exit 1
          }
          git commit -m "Strengthen project evidence and team ownership"
          git push origin HEAD:main
