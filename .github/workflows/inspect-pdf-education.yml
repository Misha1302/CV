name: Inspect PDF education blocks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install --disable-pip-version-check pymupdf
      - name: Inspect complete education blocks
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import fitz

          paths = [
              Path("pdf/Mikhail_Razakov_Compiler_EN.pdf"),
              Path("pdf/Mikhail_Razakov_Compiler_RU.pdf"),
              Path("pdf/Mikhail_Razakov_Algorithms_EN.pdf"),
              Path("pdf/Mikhail_Razakov_Algorithms_RU.pdf"),
          ]
          targets = ("Software Engineering", "Программная инженерия")

          for path in paths:
              doc = fitz.open(path)
              page = doc[0]
              print(f"=== {path} ===")
              for block_index, block in enumerate(page.get_text("dict").get("blocks", [])):
                  lines = block.get("lines", [])
                  texts = ["".join(span.get("text", "") for span in line.get("spans", [])) for line in lines]
                  if not any(any(target.casefold() in text.casefold() for target in targets) for text in texts):
                      continue
                  print(f"BLOCK {block_index} bbox={block.get('bbox')}")
                  for line in lines:
                      line_text = "".join(span.get("text", "") for span in line.get("spans", []))
                      bboxes = [span.get("bbox") for span in line.get("spans", [])]
                      print(f"LINE text={line_text!r} bboxes={bboxes}")
              doc.close()
          PY
