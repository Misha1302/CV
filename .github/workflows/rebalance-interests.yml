name: Validate CV interests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate interests sections
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          expected = {
              "index.html": (
                  "Инженерные интересы",
                  "Теоретические интересы",
                  "Алгоритмы и оптимизации",
                  "формальная верификация",
                  "сюрреальные числа",
              ),
              "en.html": (
                  "Engineering interests",
                  "Theoretical interests",
                  "Algorithms and optimization",
                  "formal verification",
                  "Surreal numbers",
              ),
          }

          for filename, markers in expected.items():
              text = Path(filename).read_text(encoding="utf-8")
              assert text.startswith("<!doctype html>")
              assert text.count("<html") == 1
              assert text.count("</html>") == 1
              assert text.count('id="interests-title"') == 1
              for marker in markers:
                  assert marker in text, (filename, marker)
              match = re.search(r'<script type="application/ld\+json">(.*?)</script>', text, re.DOTALL)
              assert match
              json.loads(match.group(1))
          PY
