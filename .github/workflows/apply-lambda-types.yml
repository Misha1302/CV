name: Apply lambda calculus research block

on:
  push:
    paths:
      - .github/workflows/apply-lambda-types.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply CV changes
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          ru_path = Path("ru.html")
          en_path = Path("en.html")
          index_path = Path("index.html")
          cv_path = Path("cv.html")

          ru = ru_path.read_text(encoding="utf-8")
          en = en_path.read_text(encoding="utf-8")
          index = index_path.read_text(encoding="utf-8")
          cv = cv_path.read_text(encoding="utf-8")

          ru_topic_old = '"Формальные языки", "Тестирование ПО"'
          ru_topic_new = '"Формальные языки", "Лямбда-исчисление", "Системы типов", "Тестирование ПО"'
          en_topic_old = '"Formal languages", "Software testing"'
          en_topic_new = '"Formal languages", "Lambda calculus", "Type systems", "Software testing"'

          ru_card_anchor = '<article><span>03</span><h3>Анализ и тестирование программ</h3><p>Точные и консервативные методы, целочисленные ограничения, метаморфное и генеративное тестирование, поиск регрессий корректности и производительности.</p></article>'
          ru_card = '<article><span>04</span><h3>λ-исчисление и основы систем типов</h3><p>Нетипизированное и простое типизированное λ-исчисление, нормальные формы и стратегии вычисления, комбинаторная логика, неподвижные точки, произведения, суммы и рекурсивные типы; знакомство с полиморфными и зависимыми типами.</p></article>'

          en_card_anchor = '<article><span>03</span><h3>Program analysis &amp; testing</h3><p>Exact and conservative reasoning, integer constraints, metamorphic and generative testing, and correctness and performance regression search.</p></article>'
          en_card = '<article><span>04</span><h3>Lambda calculus and foundations of type systems</h3><p>Untyped and simply typed lambda calculus, normal forms and evaluation strategies, combinatory logic, fixed points, product, sum and recursive types, with introductory knowledge of polymorphic and dependent types.</p></article>'

          cv_anchor = '<p><strong>Program analysis and testing:</strong> exact and conservative reasoning, integer constraints, generative/metamorphic testing and regression search.</p>'
          cv_line = '<p><strong>Lambda calculus and foundations of type systems:</strong> untyped and simply typed lambda calculus, normal forms and evaluation strategies, combinatory logic, fixed points, product, sum and recursive types, with introductory knowledge of polymorphic and dependent types.</p>'

          if "Лямбда-исчисление" not in ru:
              assert ru_topic_old in ru
              ru = ru.replace(ru_topic_old, ru_topic_new, 1)
          if ru_card not in ru:
              assert ru_card_anchor in ru
              ru = ru.replace(ru_card_anchor, ru_card_anchor + ru_card, 1)

          def update_en(text):
              if '"Lambda calculus"' not in text:
                  assert en_topic_old in text
                  text = text.replace(en_topic_old, en_topic_new, 1)
              if en_card not in text:
                  assert en_card_anchor in text
                  text = text.replace(en_card_anchor, en_card_anchor + en_card, 1)
              return text

          en = update_en(en)
          index = update_en(index)

          if cv_line not in cv:
              assert cv_anchor in cv
              cv = cv.replace(cv_anchor, cv_anchor + "\n        " + cv_line, 1)

          ru_path.write_text(ru, encoding="utf-8")
          en_path.write_text(en, encoding="utf-8")
          index_path.write_text(index, encoding="utf-8")
          cv_path.write_text(cv, encoding="utf-8")

          assert en == index
          assert ru.count("λ-исчисление и основы систем типов") == 1
          assert en.count("Lambda calculus and foundations of type systems") == 1
          assert cv.count("Lambda calculus and foundations of type systems") == 1
          assert ru.count('<article><span>04</span>') == 1
          assert en.count('<article><span>04</span>') == 1

          for text in (ru, en, index):
              match = re.search(r'<script type="application/ld\+json">(.*?)</script>', text, re.DOTALL)
              assert match
              json.loads(match.group(1))
              assert text.count("<html") == 1
              assert text.count("</html>") == 1
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ru.html en.html index.html cv.html
          git diff --cached --check
          git commit -m "Add lambda calculus research interest"
          git push
